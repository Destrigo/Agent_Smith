models:
  # OpenRouter free models (https://openrouter.ai)
  - id: qwen/qwen3-8b:free
    provider: openrouter
    provider_url: https://openrouter.ai/api/v1
    env_key: OPENROUTER_API_KEY
    notes: "Fast, good for MBPP"

  - id: qwen/qwen3-235b-a22b:free
    provider: openrouter
    provider_url: https://openrouter.ai/api/v1
    env_key: OPENROUTER_API_KEY
    notes: "Large, best for SWE-bench"

  - id: google/gemma-3-27b-it:free
    provider: openrouter
    provider_url: https://openrouter.ai/api/v1
    env_key: OPENROUTER_API_KEY

  - id: meta-llama/llama-4-scout:free
    provider: openrouter
    provider_url: https://openrouter.ai/api/v1
    env_key: OPENROUTER_API_KEY

  - id: mistralai/devstral-small:free
    provider: openrouter
    provider_url: https://openrouter.ai/api/v1
    env_key: OPENROUTER_API_KEY
    notes: "Code-focused model"

  # Groq (https://groq.com) — very fast inference
  - id: llama3-8b-8192
    provider: groq
    provider_url: https://api.groq.com/openai/v1
    env_key: GROQ_API_KEY
    notes: "Fastest inference, good baseline"

  - id: llama-3.3-70b-versatile
    provider: groq
    provider_url: https://api.groq.com/openai/v1
    env_key: GROQ_API_KEY

  # Google AI Studio (https://ai.google.dev)
  - id: gemini-2.0-flash
    provider: gemini
    provider_url: https://generativelanguage.googleapis.com/v1beta/openai
    env_key: GEMINI_API_KEY

  # Mistral (https://mistral.ai)
  - id: mistral-small-latest
    provider: mistral
    provider_url: https://api.mistral.ai/v1
    env_key: MISTRAL_API_KEY

  # Together AI (https://www.together.ai)
  - id: Qwen/Qwen2.5-Coder-32B-Instruct
    provider: together
    provider_url: https://api.together.xyz/v1
    env_key: TOGETHER_API_KEY
    notes: "Code-specialised"